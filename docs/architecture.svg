<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#333">Architecture Overview — Isolation, Timing Characterization, Virtualization Measurement, and Deterministic Rendering</text>

  <!-- Execution Environment (background) -->
  <rect x="20" y="50" width="1160" height="590" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="40" y="75" font-size="13" font-weight="600" fill="#495057">Execution Environment</text>
  <text x="40" y="93" font-size="11" fill="#868e96">Linux x86_64 · Bare Metal or Virtualized Guest</text>

  <!-- virt-jitter-lab (cross-cutting, top) -->
  <rect x="40" y="110" width="1120" height="90" rx="6" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="135" font-size="14" font-weight="600" fill="#e65100">virt-jitter-lab</text>
  <text x="60" y="155" font-size="11" fill="#555">Hypervisor Detection</text>
  <text x="260" y="155" font-size="11" fill="#555">Timer Jitter Probes</text>
  <text x="450" y="155" font-size="11" fill="#555">Preemption Gap Detection</text>
  <text x="700" y="155" font-size="11" fill="#555">IPC Latency Benchmarks</text>
  <text x="930" y="155" font-size="11" fill="#555">VM-exit Cost Profiling</text>
  <text x="60" y="185" font-size="10" fill="#888" font-style="italic">Cross-cutting measurement layer — characterizes virtualization overhead across all workloads</text>

  <!-- partition-guard -->
  <rect x="40" y="220" width="340" height="200" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="248" font-size="14" font-weight="600" fill="#0d47a1">partition-guard</text>
  <rect x="55" y="260" width="140" height="28" rx="4" fill="#bbdefb" stroke="#90caf9"/>
  <text x="125" y="279" text-anchor="middle" font-size="10" fill="#333">Partition Scheduler</text>
  <rect x="205" y="260" width="155" height="28" rx="4" fill="#bbdefb" stroke="#90caf9"/>
  <text x="282" y="279" text-anchor="middle" font-size="10" fill="#333">Budget Enforcement</text>
  <rect x="55" y="296" width="140" height="28" rx="4" fill="#bbdefb" stroke="#90caf9"/>
  <text x="125" y="315" text-anchor="middle" font-size="10" fill="#333">Health Monitor</text>
  <rect x="205" y="296" width="155" height="28" rx="4" fill="#bbdefb" stroke="#90caf9"/>
  <text x="282" y="315" text-anchor="middle" font-size="10" fill="#333">Restart Policies</text>
  <rect x="55" y="332" width="305" height="28" rx="4" fill="#bbdefb" stroke="#90caf9"/>
  <text x="207" y="351" text-anchor="middle" font-size="10" fill="#333">Lock-free IPC (Sampling Ports · Queuing Ports)</text>

  <!-- Workloads -->
  <rect x="70" y="375" width="85" height="30" rx="4" fill="#e8eaf6" stroke="#7986cb"/>
  <text x="112" y="395" text-anchor="middle" font-size="9" fill="#333">Workload A</text>
  <rect x="165" y="375" width="85" height="30" rx="4" fill="#e8eaf6" stroke="#7986cb"/>
  <text x="207" y="395" text-anchor="middle" font-size="9" fill="#333">Workload B</text>
  <rect x="260" y="375" width="85" height="30" rx="4" fill="#e8eaf6" stroke="#7986cb"/>
  <text x="302" y="395" text-anchor="middle" font-size="9" fill="#333">Workload C</text>

  <!-- wcet-probe -->
  <rect x="420" y="220" width="340" height="200" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="248" font-size="14" font-weight="600" fill="#1b5e20">wcet-probe</text>
  <rect x="435" y="260" width="155" height="28" rx="4" fill="#c8e6c9" stroke="#a5d6a7"/>
  <text x="512" y="279" text-anchor="middle" font-size="10" fill="#333">RDTSC/RDTSCP Probes</text>
  <rect x="600" y="260" width="145" height="28" rx="4" fill="#c8e6c9" stroke="#a5d6a7"/>
  <text x="672" y="279" text-anchor="middle" font-size="10" fill="#333">CPU Control</text>
  <rect x="435" y="296" width="310" height="28" rx="4" fill="#c8e6c9" stroke="#a5d6a7"/>
  <text x="590" y="315" text-anchor="middle" font-size="10" fill="#333">Lock-free Ring Buffer (1M samples)</text>
  <rect x="435" y="332" width="155" height="28" rx="4" fill="#c8e6c9" stroke="#a5d6a7"/>
  <text x="512" y="351" text-anchor="middle" font-size="10" fill="#333">Binary Trace Files</text>
  <rect x="600" y="332" width="145" height="28" rx="4" fill="#c8e6c9" stroke="#a5d6a7"/>
  <text x="672" y="351" text-anchor="middle" font-size="10" fill="#333">Python Analyzer</text>
  <rect x="435" y="375" width="310" height="30" rx="4" fill="#c8e6c9" stroke="#a5d6a7"/>
  <text x="590" y="395" text-anchor="middle" font-size="10" fill="#333">Tail-Latency Analysis (p90 → p99.99)</text>

  <!-- detframe -->
  <rect x="800" y="220" width="340" height="200" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="248" font-size="14" font-weight="600" fill="#b71c1c">detframe</text>
  <rect x="815" y="260" width="155" height="28" rx="4" fill="#ffcdd2" stroke="#ef9a9a"/>
  <text x="892" y="279" text-anchor="middle" font-size="10" fill="#333">Fixed-point Math</text>
  <rect x="980" y="260" width="145" height="28" rx="4" fill="#ffcdd2" stroke="#ef9a9a"/>
  <text x="1052" y="279" text-anchor="middle" font-size="10" fill="#333">Q16.16 Trig LUT</text>
  <rect x="815" y="296" width="310" height="28" rx="4" fill="#ffcdd2" stroke="#ef9a9a"/>
  <text x="970" y="315" text-anchor="middle" font-size="10" fill="#333">Deterministic Rasterizer (Bresenham · Midpoint · Scanline)</text>
  <rect x="815" y="332" width="310" height="28" rx="4" fill="#ffcdd2" stroke="#ef9a9a"/>
  <text x="970" y="351" text-anchor="middle" font-size="10" fill="#333">PFD Widgets (Attitude · Tapes · Compass · Text)</text>
  <rect x="815" y="375" width="155" height="30" rx="4" fill="#ffcdd2" stroke="#ef9a9a"/>
  <text x="892" y="395" text-anchor="middle" font-size="10" fill="#333">Frame Timer</text>
  <rect x="980" y="375" width="145" height="30" rx="4" fill="#ffcdd2" stroke="#ef9a9a"/>
  <text x="1052" y="395" text-anchor="middle" font-size="10" fill="#333">PPM Capture</text>

  <!-- Arrows: partition-guard → wcet-probe -->
  <line x1="380" y1="320" x2="420" y2="320" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrows: wcet-probe → detframe -->
  <line x1="760" y1="320" x2="800" y2="320" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrows: workloads → wcet-probe -->
  <path d="M 345 390 Q 390 390 420 370" stroke="#666" stroke-width="1" fill="none" marker-end="url(#arrow)" stroke-dasharray="4"/>

  <!-- Outputs row -->
  <rect x="40" y="440" width="1120" height="10" rx="0" fill="none"/>

  <!-- Output: Fault Logs -->
  <rect x="40" y="460" width="220" height="65" rx="6" fill="#fff" stroke="#1565c0" stroke-width="1" stroke-dasharray="4"/>
  <text x="150" y="483" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Fault / Restart Logs</text>
  <text x="150" y="500" text-anchor="middle" font-size="9" fill="#888">Partition health events</text>
  <text x="150" y="514" text-anchor="middle" font-size="9" fill="#888">Budget overrun records</text>

  <!-- Output: Virt Report -->
  <rect x="280" y="460" width="220" height="65" rx="6" fill="#fff" stroke="#f57c00" stroke-width="1" stroke-dasharray="4"/>
  <text x="390" y="483" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Virtualization Report</text>
  <text x="390" y="500" text-anchor="middle" font-size="9" fill="#888">Jitter / IPC / VM-exit cost</text>
  <text x="390" y="514" text-anchor="middle" font-size="9" fill="#888">Hypervisor characterization</text>

  <!-- Output: Timing Report -->
  <rect x="520" y="460" width="220" height="65" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="1" stroke-dasharray="4"/>
  <text x="630" y="483" text-anchor="middle" font-size="11" font-weight="600" fill="#1b5e20">Timing Report</text>
  <text x="630" y="500" text-anchor="middle" font-size="9" fill="#888">Observed max / percentiles</text>
  <text x="630" y="514" text-anchor="middle" font-size="9" fill="#888">Histograms / trace files</text>

  <!-- Output: Framebuffer -->
  <rect x="760" y="460" width="220" height="65" rx="6" fill="#fff" stroke="#c62828" stroke-width="1" stroke-dasharray="4"/>
  <text x="870" y="483" text-anchor="middle" font-size="11" font-weight="600" fill="#b71c1c">Framebuffer Output</text>
  <text x="870" y="500" text-anchor="middle" font-size="9" fill="#888">PFD render frames</text>
  <text x="870" y="514" text-anchor="middle" font-size="9" fill="#888">Reproducible / diffable</text>

  <!-- Arrows to outputs -->
  <line x1="210" y1="420" x2="150" y2="460" stroke="#1565c0" stroke-width="1" stroke-dasharray="3" marker-end="url(#arrow)"/>
  <line x1="590" y1="145" x2="390" y2="460" stroke="#f57c00" stroke-width="1" stroke-dasharray="3" marker-end="url(#arrow)"/>
  <line x1="590" y1="420" x2="630" y2="460" stroke="#2e7d32" stroke-width="1" stroke-dasharray="3" marker-end="url(#arrow)"/>
  <line x1="970" y1="420" x2="870" y2="460" stroke="#c62828" stroke-width="1" stroke-dasharray="3" marker-end="url(#arrow)"/>

  <!-- Pipeline labels -->
  <text x="210" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">ISOLATE</text>
  <text x="400" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="#e65100">CHARACTERIZE</text>
  <text x="590" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">VALIDATE</text>
  <text x="970" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="#b71c1c">RENDER</text>

  <!-- Footer -->
  <text x="600" y="560" text-anchor="middle" font-size="10" fill="#adb5bd" font-style="italic">Representative architecture for research prototypes and timing/rendering experiments; not a certified avionics platform.</text>
  <text x="600" y="578" text-anchor="middle" font-size="10" fill="#adb5bd">All repositories: C++23 · CMake ≥ 3.25 · GCC ≥ 13 / Clang ≥ 17 · CLOCK_MONOTONIC · Lock-free data paths · Apache-2.0</text>

  <!-- Yabloko Labs -->
  <text x="600" y="620" text-anchor="middle" font-size="11" fill="#868e96">Yabloko Labs — github.com/yablokolabs</text>
</svg>
