<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="arrow-al" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1100" height="580" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">avionics-lab — Complete Avionics Research Stack</text>
  <text x="550" y="50" text-anchor="middle" font-size="12" fill="#64748b">10 repositories · 53 tests · C++23 · Apache-2.0</text>

  <!-- Row 1: Core Infrastructure -->
  <text x="30" y="85" font-weight="bold" fill="#475569" font-size="11">INFRASTRUCTURE</text>

  <!-- partition-guard -->
  <rect x="30" y="95" width="150" height="75" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="105" y="115" text-anchor="middle" font-weight="bold" fill="#1e40af" font-size="11">partition-guard</text>
  <text x="105" y="132" text-anchor="middle" fill="#1e40af" font-size="9">Temporal isolation</text>
  <text x="105" y="146" text-anchor="middle" fill="#1e40af" font-size="9">Budget enforcement</text>
  <text x="105" y="160" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="bold">ISOLATE</text>

  <!-- comm-bus -->
  <rect x="200" y="95" width="150" height="75" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="275" y="115" text-anchor="middle" font-weight="bold" fill="#065f46" font-size="11">comm-bus</text>
  <text x="275" y="132" text-anchor="middle" fill="#065f46" font-size="9">Lock-free pub/sub</text>
  <text x="275" y="146" text-anchor="middle" fill="#065f46" font-size="9">Time-triggered scheduling</text>
  <text x="275" y="160" text-anchor="middle" fill="#10b981" font-size="9" font-weight="bold">CONNECT</text>

  <!-- health-mon -->
  <rect x="370" y="95" width="150" height="75" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="445" y="115" text-anchor="middle" font-weight="bold" fill="#5b21b6" font-size="11">health-mon</text>
  <text x="445" y="132" text-anchor="middle" fill="#5b21b6" font-size="9">TMR voting · Watchdog</text>
  <text x="445" y="146" text-anchor="middle" fill="#5b21b6" font-size="9">Degraded mode mgmt</text>
  <text x="445" y="160" text-anchor="middle" fill="#8b5cf6" font-size="9" font-weight="bold">MONITOR</text>

  <!-- Row 2: Measurement & Characterization -->
  <text x="30" y="200" font-weight="bold" fill="#475569" font-size="11">MEASUREMENT</text>

  <!-- virt-jitter-lab -->
  <rect x="30" y="210" width="150" height="75" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="105" y="230" text-anchor="middle" font-weight="bold" fill="#92400e" font-size="11">virt-jitter-lab</text>
  <text x="105" y="247" text-anchor="middle" fill="#92400e" font-size="9">Hypervisor detection</text>
  <text x="105" y="261" text-anchor="middle" fill="#92400e" font-size="9">Timer jitter · VM exit</text>
  <text x="105" y="275" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="bold">CHARACTERIZE</text>

  <!-- wcet-probe -->
  <rect x="200" y="210" width="150" height="75" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="275" y="230" text-anchor="middle" font-weight="bold" fill="#92400e" font-size="11">wcet-probe</text>
  <text x="275" y="247" text-anchor="middle" fill="#92400e" font-size="9">Execution timing</text>
  <text x="275" y="261" text-anchor="middle" fill="#92400e" font-size="9">Tail-latency analysis</text>
  <text x="275" y="275" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="bold">VALIDATE</text>

  <!-- fault-inject -->
  <rect x="370" y="210" width="150" height="75" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="445" y="230" text-anchor="middle" font-weight="bold" fill="#b91c1c" font-size="11">fault-inject</text>
  <text x="445" y="247" text-anchor="middle" fill="#b91c1c" font-size="9">Bit flip · Drift · Stuck</text>
  <text x="445" y="261" text-anchor="middle" fill="#b91c1c" font-size="9">Automated campaigns</text>
  <text x="445" y="275" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="bold">STRESS TEST</text>

  <!-- Row 3: Application -->
  <text x="30" y="320" font-weight="bold" fill="#475569" font-size="11">APPLICATION</text>

  <!-- track-core -->
  <rect x="30" y="330" width="150" height="75" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="105" y="350" text-anchor="middle" font-weight="bold" fill="#3730a3" font-size="11">track-core</text>
  <text x="105" y="367" text-anchor="middle" fill="#3730a3" font-size="9">Kalman filter · EKF</text>
  <text x="105" y="381" text-anchor="middle" fill="#3730a3" font-size="9">Multi-sensor fusion</text>
  <text x="105" y="395" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="bold">TRACK</text>

  <!-- nav-sim -->
  <rect x="200" y="330" width="150" height="75" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="275" y="350" text-anchor="middle" font-weight="bold" fill="#3730a3" font-size="11">nav-sim</text>
  <text x="275" y="367" text-anchor="middle" fill="#3730a3" font-size="9">Flight phase FSM</text>
  <text x="275" y="381" text-anchor="middle" fill="#3730a3" font-size="9">Mode management</text>
  <text x="275" y="395" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="bold">NAVIGATE</text>

  <!-- detframe -->
  <rect x="370" y="330" width="150" height="75" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="445" y="350" text-anchor="middle" font-weight="bold" fill="#3730a3" font-size="11">detframe</text>
  <text x="445" y="367" text-anchor="middle" fill="#3730a3" font-size="9">Software rasterizer</text>
  <text x="445" y="381" text-anchor="middle" fill="#3730a3" font-size="9">PFD widgets</text>
  <text x="445" y="395" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="bold">RENDER</text>

  <!-- log-replay -->
  <rect x="370" y="430" width="150" height="60" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="445" y="452" text-anchor="middle" font-weight="bold" fill="#475569" font-size="11">log-replay</text>
  <text x="445" y="468" text-anchor="middle" fill="#475569" font-size="9">Binary recorder · Bit-exact replay</text>
  <text x="445" y="482" text-anchor="middle" fill="#64748b" font-size="9" font-weight="bold">RECORD</text>

  <!-- Pipeline diagram on right side -->
  <rect x="580" y="80" width="490" height="395" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="825" y="105" text-anchor="middle" font-weight="bold" fill="#1e293b" font-size="13">Execution Pipeline</text>

  <!-- Pipeline steps -->
  <rect x="620" y="125" width="130" height="35" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="685" y="147" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold">1. ISOLATE</text>
  <line x1="685" y1="160" x2="685" y2="170" stroke="#64748b" stroke-width="1" marker-end="url(#arrow-al)"/>

  <rect x="620" y="175" width="130" height="35" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <text x="685" y="197" text-anchor="middle" fill="#065f46" font-size="11" font-weight="bold">2. CONNECT</text>
  <line x1="685" y1="210" x2="685" y2="220" stroke="#64748b" stroke-width="1" marker-end="url(#arrow-al)"/>

  <rect x="620" y="225" width="130" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="685" y="247" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">3. CHARACTERIZE</text>
  <line x1="685" y1="260" x2="685" y2="270" stroke="#64748b" stroke-width="1" marker-end="url(#arrow-al)"/>

  <rect x="620" y="275" width="130" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="685" y="297" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">4. VALIDATE</text>
  <line x1="685" y1="310" x2="685" y2="320" stroke="#64748b" stroke-width="1" marker-end="url(#arrow-al)"/>

  <rect x="620" y="325" width="130" height="35" rx="4" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="685" y="347" text-anchor="middle" fill="#3730a3" font-size="11" font-weight="bold">5. TRACK</text>
  <line x1="685" y1="360" x2="685" y2="370" stroke="#64748b" stroke-width="1" marker-end="url(#arrow-al)"/>

  <rect x="620" y="375" width="130" height="35" rx="4" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="685" y="397" text-anchor="middle" fill="#3730a3" font-size="11" font-weight="bold">6. NAVIGATE</text>
  <line x1="685" y1="410" x2="685" y2="420" stroke="#64748b" stroke-width="1" marker-end="url(#arrow-al)"/>

  <rect x="620" y="425" width="130" height="35" rx="4" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="685" y="447" text-anchor="middle" fill="#3730a3" font-size="11" font-weight="bold">7. RENDER</text>

  <!-- Cross-cutting concerns on right -->
  <rect x="790" y="125" width="260" height="100" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-dasharray="4,3"/>
  <text x="920" y="148" text-anchor="middle" font-weight="bold" fill="#5b21b6" font-size="11">Cross-Cutting</text>
  <text x="920" y="170" text-anchor="middle" fill="#5b21b6" font-size="10">health-mon → all stages</text>
  <text x="920" y="188" text-anchor="middle" fill="#5b21b6" font-size="10">log-replay → all stages</text>
  <text x="920" y="206" text-anchor="middle" fill="#5b21b6" font-size="10">fault-inject → any stage</text>

  <!-- Technical baseline -->
  <rect x="790" y="250" width="260" height="120" rx="6" fill="white" stroke="#cbd5e1"/>
  <text x="920" y="275" text-anchor="middle" font-weight="bold" fill="#475569" font-size="11">Technical Baseline</text>
  <text x="920" y="296" text-anchor="middle" fill="#64748b" font-size="10">C++23 · CMake ≥ 3.25</text>
  <text x="920" y="314" text-anchor="middle" fill="#64748b" font-size="10">-Wall -Wextra -Wpedantic -Werror</text>
  <text x="920" y="332" text-anchor="middle" fill="#64748b" font-size="10">CLOCK_MONOTONIC · Lock-free</text>
  <text x="920" y="350" text-anchor="middle" fill="#64748b" font-size="10">No hot-path allocation</text>

  <!-- Test summary -->
  <rect x="790" y="395" width="260" height="65" rx="6" fill="#d1fae5" stroke="#10b981"/>
  <text x="920" y="418" text-anchor="middle" font-weight="bold" fill="#065f46" font-size="11">All Tests Passing</text>
  <text x="920" y="438" text-anchor="middle" fill="#065f46" font-size="10">53 / 53 across 10 repositories</text>

  <!-- Footer -->
  <text x="550" y="555" text-anchor="middle" fill="#94a3b8" font-size="10">Research prototypes — not certified to any standard. Yabloko Labs · Apache-2.0.</text>
</svg>
